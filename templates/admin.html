<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Source Code Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 20px; }
        .admin-container { max-width: 1100px; margin: 0 auto; }
        .admin-card { background: rgba(20, 20, 20, 0.8); padding: 25px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.05); }
        input, textarea { background: rgba(0,0,0,0.5); color: #fff; border: 1px solid #333; border-radius: 5px; box-sizing: border-box; }
        input:focus, textarea:focus { border-color: #00d2ff; outline: none; }
    </style>
</head>
<body>
    <div class="admin-container">
        {% if not logged_in %}
        <div class="admin-card" style="max-width: 400px; margin: 100px auto; text-align: center;">
            <h2 style="color: #00d2ff; margin-bottom: 20px;">Admin Login</h2>
            {% if error %}<p style="color: #ff5f56; font-size: 0.9rem; margin-bottom: 15px;">{{ error }}</p>{% endif %}
            <form method="POST">
                <input type="text" name="username" placeholder="Username" required style="width: 100%; padding: 12px; margin-bottom: 15px;">
                <input type="password" name="password" placeholder="Password" required style="width: 100%; padding: 12px; margin-bottom: 20px;">
                <button type="submit" class="submit-btn" style="width: 100%;">Login to Dashboard</button>
            </form>
        </div>
        
        {% else %}
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h1 style="color: #00d2ff;">Admin Dashboard</h1>
            <a href="/admin-logout" style="color: #ff5f56; text-decoration: none; border: 1px solid #ff5f56; padding: 8px 15px; border-radius: 5px; transition: 0.3s;" onmouseover="this.style.background='#ff5f56'; this.style.color='#000';" onmouseout="this.style.background='transparent'; this.style.color='#ff5f56';">Logout</a>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px;">
            
            <div>
                <div class="admin-card">
                    <h3 style="margin-bottom: 15px; color: #f5af19;">Overview Stats</h3>
                    <p style="margin-bottom: 8px; color: #ccc;">Total Users: <span id="stat-users" style="color: #fff; font-weight: bold;">0</span></p>
                    <p style="margin-bottom: 8px; color: #ccc;">Premium Users: <span id="stat-premium" style="color: #fff; font-weight: bold;">0</span></p>
                    <p style="margin-bottom: 8px; color: #ccc;">Total Revenue: <span style="color: #00ff88; font-weight: bold;">₹<span id="stat-revenue">0</span></span></p>
                    <p style="margin-bottom: 8px; color: #ccc;">Total Page Views: <span id="stat-views" style="color: #fff; font-weight: bold;">0</span></p>
                </div>
                
                <div class="admin-card">
                    <h3 style="margin-bottom: 15px; color: #00ff88;">Pending Payments</h3>
                    <div id="pending-list">Loading...</div>
                </div>
            </div>

            <div>
                <div class="admin-card">
                    <h3 style="margin-bottom: 15px; color: #00d2ff;">+ Add Free Code</h3>
                    <form onsubmit="submitNewCode(event)">
                        <input type="text" id="code-title" placeholder="Code Title (e.g., Python Password Generator)" required style="width: 100%; padding: 12px; margin-bottom: 12px;">
                        <textarea id="code-content" placeholder="Paste the raw Python/HTML code here..." required style="width: 100%; height: 150px; padding: 12px; margin-bottom: 12px; font-family: monospace;"></textarea>
                        <button type="submit" class="submit-btn" style="width: 100%;">Publish Free Code</button>
                    </form>
                </div>

                <div class="admin-card">
                    <h3 style="margin-bottom: 15px; color: #b06ab3;">+ Add AI Prompt</h3>
                    <form onsubmit="submitNewPrompt(event)">
                        <input type="text" id="prompt-title" placeholder="Prompt Title (e.g., E-Commerce Landing Page)" required style="width: 100%; padding: 12px; margin-bottom: 12px;">
                        <textarea id="prompt-content" placeholder="Paste the full AI prompt text here..." required style="width: 100%; height: 100px; padding: 12px; margin-bottom: 12px;"></textarea>
                        <button type="submit" class="submit-btn premium-btn" style="width: 100%; background: linear-gradient(90deg, #b06ab3, #4568dc); color: white;">Publish AI Prompt</button>
                    </form>
                </div>
            </div>
        </div>

        <script>
            // Load Admin Stats & Payments
            async function loadAdminData() {
                const res = await fetch('/api/admin-data');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('stat-users').innerText = data.total_users;
                    document.getElementById('stat-premium').innerText = data.premium_users;
                    document.getElementById('stat-revenue').innerText = data.total_revenue;
                    document.getElementById('stat-views').innerText = data.page_views;
                    
                    const pendingDiv = document.getElementById('pending-list');
                    if (data.pending_payments.length === 0) {
                        pendingDiv.innerHTML = '<p style="color: #666; font-size: 0.9rem;">No pending payments right now.</p>';
                    } else {
                        pendingDiv.innerHTML = data.pending_payments.map(tx => `
                            <div style="background: rgba(0,0,0,0.5); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 3px solid #f5af19;">
                                <p style="font-size: 0.9rem; margin-bottom: 5px;"><strong>User:</strong> ${tx.email}</p>
                                <p style="font-size: 0.9rem; margin-bottom: 5px;"><strong>Plan:</strong> ${tx.plan} (₹${tx.amount})</p>
                                <p style="font-size: 0.9rem; margin-bottom: 10px; color: #aaa;"><strong>UTR:</strong> ${tx.utr}</p>
                                <button onclick="approvePayment(${tx.id})" style="background: #00ff88; color: #000; font-weight: bold; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; transition: 0.2s;">Approve Payment</button>
                            </div>
                        `).join('');
                    }
                }
            }

            async function approvePayment(id) {
                if(!confirm("Are you sure you want to approve this payment? The user will get Premium access immediately.")) return;
                const res = await fetch(`/admin/approve-payment/${id}`, { method: 'POST' });
                if(res.ok) { alert("Payment Approved!"); loadAdminData(); }
            }

            // Publish New Code
            async function submitNewCode(e) {
                e.preventDefault();
                const title = document.getElementById('code-title').value;
                const code = document.getElementById('code-content').value;
                const btn = e.target.querySelector('button');
                btn.innerText = "Publishing...";

                try {
                    const res = await fetch('/admin/add-code', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, code })
                    });
                    if (res.ok) {
                        alert("Code published successfully! It is now saved in your database.");
                        e.target.reset(); // Clear the form
                    } else { alert("Error publishing code."); }
                } catch(err) { alert("Server error."); }
                btn.innerText = "Publish Free Code";
            }

            // Publish New Prompt
            async function submitNewPrompt(e) {
                e.preventDefault();
                const title = document.getElementById('prompt-title').value;
                const prompt_text = document.getElementById('prompt-content').value;
                const btn = e.target.querySelector('button');
                btn.innerText = "Publishing...";

                try {
                    const res = await fetch('/admin/add-prompt', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ title, prompt_text })
                    });
                    if (res.ok) {
                        alert("AI Prompt published successfully! It is now saved in your database.");
                        e.target.reset(); // Clear the form
                    } else { alert("Error publishing prompt."); }
                } catch(err) { alert("Server error."); }
                btn.innerText = "Publish AI Prompt";
            }

            // Load data when page opens
            window.onload = loadAdminData;
        </script>
        {% endif %}
    </div>
</body>
</html>
